<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>一隅植物星球</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',sans-serif;background:#09090b;min-height:100vh;color:#fff;overflow:hidden}
#globe-canvas{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:1}
.header{position:fixed;top:0;left:0;right:0;z-index:100;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to bottom,rgba(9,9,11,0.9),transparent)}
.logo{display:flex;align-items:center;gap:10px}.logo-icon{font-size:1.6rem}.logo-text{font-size:1rem;font-weight:600}
.mode-toggle{width:36px;height:36px;border:1px solid rgba(255,255,255,0.15);border-radius:50%;background:rgba(255,255,255,0.05);color:#a5d6a7;cursor:pointer}
.footer{position:fixed;bottom:0;left:0;right:0;z-index:100;padding:12px 16px 28px;background:linear-gradient(to top,rgba(9,9,11,0.95),transparent)}
.stats{text-align:center;margin-bottom:12px;font-size:0.85rem;color:rgba(255,255,255,0.5)}.stats span{color:#00CB95}
.region-tabs{display:flex;justify-content:center;gap:6px}.region-tab{padding:8px 14px;border:1px solid rgba(255,255,255,0.1);border-radius:20px;background:rgba(255,255,255,0.03);color:rgba(255,255,255,0.5);font-size:0.8rem;cursor:pointer}
.region-tab.active{background:#fff;color:#09090b}
.plant-card{position:fixed;bottom:160px;left:50%;transform:translateX(-50%) translateY(30px);z-index:80;width:90%;max-width:340px;padding:20px;border-radius:16px;background:rgba(15,17,20,0.95);border:1px solid rgba(0,200,120,0.25);opacity:0;pointer-events:none;transition:all 0.4s}
.plant-card.show{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0)}
.plant-card .emoji{font-size:2.5rem;margin-bottom:10px}.plant-card .name{font-size:1.3rem;font-weight:600}.plant-card .name-en{font-size:0.85rem;color:#00CB95;margin-bottom:10px}.plant-card .desc{font-size:0.85rem;color:rgba(255,255,255,0.7)}.plant-card .location{display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:5px 12px;background:rgba(0,200,120,0.1);border-radius:15px;font-size:0.8rem;color:#00CB95}
.close-btn{position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.1);border:none;color:rgba(255,255,255,0.6);font-size:1rem;cursor:pointer}
.plants-grid{position:fixed;top:80px;left:0;right:0;bottom:180px;z-index:50;padding:16px;overflow-y:auto;opacity:0;pointer-events:none}.plants-grid.show{opacity:1;pointer-events:auto}
.plant-item{display:flex;align-items:center;gap:14px;padding:14px;margin-bottom:10px;border-radius:14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);cursor:pointer}
.plant-item .emoji{font-size:2rem;width:50px;height:50px;display:flex;align-items:center;justify-content:center;background:rgba(0,200,120,0.1);border-radius:12px}
.plant-item .info{flex:1}.plant-item .name{font-size:1rem;font-weight:500}.plant-item .location{font-size:0.8rem;color:rgba(255,255,255,0.5)}
.hint{position:fixed;bottom:180px;left:50%;transform:translateX(-50%);z-index:10;font-size:0.75rem;color:rgba(255,255,255,0.3)}
</style></head>
<body>
<canvas id="globe-canvas"></canvas>
<header class="header"><div class="logo"><span class="logo-icon">🌿</span><span class="logo-text">一隅植物星球</span></div><button class="mode-toggle" id="modeToggle">☀️</button></header>
<div class="hint">👆 点击地球探索植物</div>
<div class="plants-grid" id="plantsGrid"></div>
<div class="plant-card" id="plantCard"><button class="close-btn" id="closeCard">✕</button><div class="emoji" id="cardEmoji">🌿</div><div class="name" id="cardName"></div><div class="name-en" id="cardNameEn"></div><div class="desc" id="cardDesc"></div><div class="location" id="cardLocation"></div></div>
<footer class="footer"><div class="stats"><span>42</span> 种植物 · 真实坐标 · <span>43</span> 次邂逅</div><div class="region-tabs"><button class="region-tab active" data-region="all">全球</button><button class="region-tab" data-region="asia">亚洲</button><button class="region-tab" data-region="europe">欧洲</button><button class="region-tab" data-region="africa">非洲</button><button class="region-tab" data-region="north-america">北美</button><button class="region-tab" data-region="south-america">南美</button><button class="region-tab" data-region="australia">澳洲</button></div></footer>
<script>
var plantsData=[{name:"二球悬铃木",nameEn:"Platanus",desc:"英国伦敦的标志行道树",location:"英国伦敦",region:"europe",lat:51.5,lng:-0.1,emoji:"🌳"},{name:"梧桐",nameEn:"Firmiana",desc:"中国传统文化中的吉祥树木",location:"中国湖北",region:"asia",lat:31,lng:112,emoji:"🌳"},{name:"珙桐",nameEn:"Davidia",desc:"活化石植物",location:"中国湖北",region:"asia",lat:31.7,lng:110.7,emoji:"🌳"},{name:"蜡梅",nameEn:"Chimonanthus",desc:"冬季开花的芳香灌木",location:"中国四川",region:"asia",lat:30.5,lng:104,emoji:"🌿"},{name:"宋梅",nameEn:"Cymbidium",desc:"春兰四大天王之首",location:"中国浙江",region:"asia",lat:28,lng:120,emoji:"🌱"},{name:"朱砂梅",nameEn:"Prunus",desc:"红色梅花的传统品种",location:"中国浙江",region:"asia",lat:28.5,lng:119.5,emoji:"🌺"},{name:"松茸",nameEn:"Tricholoma",desc:"珍贵野生食用菌",location:"中国云南",region:"asia",lat:25,lng:102,emoji:"🍄"},{name:"五叶地锦",nameEn:"Parthenocissus",desc:"北美东部的攀援植物",location:"北美东部",region:"north-america",lat:40,lng:-75,emoji:"🌺"},{name:"绿樱",nameEn:"Bougainvillea",desc:"三角梅的绿色变异品种",location:"巴西里约",region:"south-america",lat:-22.9,lng:-43.2,emoji:"🌿"},{name:"龙舌兰",nameEn:"Agave",desc:"墨西哥特色的多肉植物",location:"墨西哥",region:"north-america",lat:23,lng:-102,emoji:"🌵"},{name:"冰梅",nameEn:"Echeveria",desc:"可爱的多肉植物",location:"墨西哥",region:"north-america",lat:20,lng:-100,emoji:"🌵"},{name:"碧冬茄",nameEn:"Petunia",desc:"南美原生植物的后代",location:"南美阿根廷",region:"south-america",lat:-34.6,lng:-58.4,emoji:"🌱"},{name:"君子兰",nameEn:"Clivia",desc:"南非纳塔尔省原生",location:"南非纳塔尔",region:"africa",lat:-29,lng:31,emoji:"🌱"},{name:"猴面包树",nameEn:"Adansonia",desc:"非洲特有的长寿树种",location:"马达加斯加",region:"africa",lat:-20,lng:47,emoji:"🌳"},{name:"考拉树",nameEn:"Eucalyptus",desc:"澳洲代表性树种",location:"澳大利亚",region:"australia",lat:-33,lng:147,emoji:"🌲"}];
var canvas=document.getElementById("globe-canvas");
var ctx=canvas.getContext("2d");
var plantCard=document.getElementById("plantCard");
var plantsGrid=document.getElementById("plantsGrid");
var width,height,centerX,centerY,globeRadius,rotation=0,isAutoRotating=true;
var earthImg=new Image();
earthImg.src="earth.jpg";
earthImg.onload=function(){animate();};
function resize(){var s=Math.min(window.innerWidth,window.innerHeight)*0.65;width=canvas.width=window.innerWidth;height=canvas.height=window.innerHeight;centerX=width/2;centerY=height/2;globeRadius=s/2;}
resize();window.addEventListener("resize",resize);
function drawStars(){ctx.fillStyle="#09090b";ctx.fillRect(0,0,width,height);for(var i=0;i<120;i++){var x=(Math.sin(i*123.456)*0.5+0.5)*width;var y=(Math.cos(i*789.012)*0.5+0.5)*height;var size=Math.sin(i*345.678)*1+1.5;var alpha=Math.cos(i*567.89)*0.3+0.5;ctx.beginPath();ctx.arc(x,y,size,0,Math.PI*2);ctx.fillStyle="rgba(255,255,255,"+alpha+")";ctx.fill();}}
function drawEarth(){var glowGrad=ctx.createRadialGradient(centerX,centerY,globeRadius*0.9,centerX,centerY,globeRadius*1.25);glowGrad.addColorStop(0,"rgba(16,185,129,0)");glowGrad.addColorStop(0.5,"rgba(16,185,129,0.15)");glowGrad.addColorStop(1,"rgba(16,185,129,0)");ctx.beginPath();ctx.arc(centerX,centerY,globeRadius*1.25,0,Math.PI*2);ctx.fillStyle=glowGrad;ctx.fill();ctx.save();ctx.beginPath();ctx.arc(centerX,centerY,globeRadius,0,Math.PI*2);ctx.clip();if(earthImg.complete&&earthImg.naturalWidth>0){var imgRot=rotation*Math.PI/180;ctx.save();ctx.translate(centerX,centerY);ctx.rotate(imgRot);ctx.drawImage(earthImg,-globeRadius,-globeRadius,globeRadius*2,globeRadius*2);ctx.restore();}else{ctx.fillStyle="#1e5a7a";ctx.fillRect(centerX-globeRadius,centerY-globeRadius,globeRadius*2,globeRadius*2);}ctx.restore();ctx.beginPath();ctx.arc(centerX,centerY,globeRadius,0,Math.PI*2);var shadowGrad=ctx.createLinearGradient(centerX-globeRadius,centerY,centerX+globeRadius,centerY);shadowGrad.addColorStop(0,"rgba(0,0,0,0.7)");shadowGrad.addColorStop(0.3,"rgba(0,0,0,0.3)");shadowGrad.addColorStop(0.5,"rgba(0,0,0,0)");shadowGrad.addColorStop(1,"rgba(0,0,0,0)");ctx.fillStyle=shadowGrad;ctx.fill();ctx.beginPath();ctx.arc(centerX-globeRadius*0.25,centerY-globeRadius*0.25,globeRadius*0.5,0,Math.PI*2);var highlightGrad=ctx.createRadialGradient(centerX-globeRadius*0.25,centerY-globeRadius*0.25,0,centerX-globeRadius*0.25,centerY-globeRadius*0.25,globeRadius*0.5);highlightGrad.addColorStop(0,"rgba(255,255,255,0.2)");highlightGrad.addColorStop(1,"rgba(255,255,255,0)");ctx.fillStyle=highlightGrad;ctx.fill();ctx.beginPath();ctx.arc(centerX,centerY,globeRadius+3,0,Math.PI*2);ctx.strokeStyle="rgba(16,185,129,0.4)";ctx.lineWidth=3;ctx.stroke();}
function drawMarkers(){var visible=[];plantsData.forEach(function(p,i){var phi=(90-p.lat)*Math.PI/180;var theta=(p.lng+rotation+180)*Math.PI/180;var x=globeRadius*Math.sin(phi)*Math.cos(theta);var y=-globeRadius*Math.cos(phi);var z=globeRadius*Math.sin(phi)*Math.sin(theta);if(z>0){var scale=Math.max(0,(globeRadius-z)/(2*globeRadius));var sx=centerX+x*scale;var sy=centerY+y*scale;var size=14*scale;var pulse=Math.sin(Date.now()/500+i)*0.2+0.8;var glowGrad=ctx.createRadialGradient(sx,sy,0,sx,sy,size*3.5);glowGrad.addColorStop(0,"rgba(16,185,129,0.7)");glowGrad.addColorStop(1,"rgba(16,185,129,0)");ctx.beginPath();ctx.arc(sx,sy,size*3.5*pulse,0,Math.PI*2);ctx.fillStyle=glowGrad;ctx.fill();ctx.beginPath();ctx.arc(sx,sy,size,0,Math.PI*2);ctx.fillStyle="rgba(0,200,120,0.95)";ctx.fill();ctx.font=size*1.2+"px Arial";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(p.emoji,sx,sy);visible.push({x:sx,y:sy,r:size*2.5,index:i});}});window.visibleMarkers=visible;}
function animate(){if(isAutoRotating){rotation+=0.15;}drawStars();drawEarth();drawMarkers();requestAnimationFrame(animate);}
function showPlantDetail(index){var plant=plantsData[index];document.getElementById("cardEmoji").textContent=plant.emoji;document.getElementById("cardName").textContent=plant.name;document.getElementById("cardNameEn").textContent=plant.nameEn;document.getElementById("cardDesc").textContent=plant.desc;document.getElementById("cardLocation").innerHTML="📍 "+plant.location;plantCard.classList.add("show");plantsGrid.classList.remove("show");isAutoRotating=false;}
document.getElementById("closeCard").addEventListener("click",function(){plantCard.classList.remove("show");isAutoRotating=true;});
function createPlantList(filter){var filtered=filter==="all"?plantsData:plantsData.filter(function(p){return p.region===filter;});plantsGrid.innerHTML=filtered.map(function(plant,i){return'<div class="plant-item" data-index="'+plantsData.indexOf(plant)+'"><div class="emoji">'+plant.emoji+'</div><div class="info"><div class="name">'+plant.name+'</div><div class="location">📍 '+plant.location+'</div></div><div class="arrow">›</div></div>';}).join("");plantsGrid.querySelectorAll(".plant-item").forEach(function(item){item.addEventListener("click",function(){showPlantDetail(parseInt(this.dataset.index));});});}
document.querySelectorAll(".region-tab").forEach(function(tab){tab.addEventListener("click",function(){document.querySelector(".region-tab.active").classList.remove("active");this.classList.add("active");var region=this.dataset.region;if(region==="all"){plantsGrid.classList.remove("show");isAutoRotating=true;}else{createPlantList(region);plantsGrid.classList.add("show");plantCard.classList.remove("show");isAutoRotating=false;rotation=region==="asia"?-120:region==="europe"?20:region==="africa"?50:region==="north-america"?-150:region==="south-america"?80:region==="australia"?140:0;}});});
canvas.addEventListener("click",function(e){var rect=canvas.getBoundingClientRect();var x=e.clientX-rect.left;var y=e.clientY-rect.top;if(window.visibleMarkers){for(var i=0;i<window.visibleMarkers.length;i++){var m=window.visibleMarkers[i];var dx=x-m.x;var dy=y-m.y;if(dx*dx+dy*dy<m.r*m.r){showPlantDetail(m.index);return;}} var dx2=x-centerX;var dy2=y-centerY;if(dx2*dx2+dy2*dy2<globeRadius*globeRadius){plantsGrid.classList.toggle("show");if(!plantsGrid.classList.contains("show")){plantCard.classList.remove("show");}}}}
);document.addEventListener("click",function(e){if(!e.target.closest(".plant-card")&&!e.target.closest(".plants-grid")&&!e.target.closest("canvas")&&!e.target.closest(".region-tabs")){plantCard.classList.remove("show");}});
document.getElementById("modeToggle").addEventListener("click",function(){var isDark=document.body.style.background!=="rgb(135, 206, 235)";if(isDark){document.body.style.background="#87CEEB";this.textContent="🌙";}else{document.body.style.background="#09090b";this.textContent="☀️";}});
animate();setTimeout(function(){document.querySelector(".hint").style.opacity="0";},4000);
</script></body></html>
